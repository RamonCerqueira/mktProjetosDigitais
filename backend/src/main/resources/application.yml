spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mvc:
    problemdetails:
      enabled: true
app:
  jwt:
    secret: ${APP_JWT_SECRET:super-secret-key-super-secret-key-super-secret-key}
    access-expiration-ms: 3600000
    refresh-expiration-ms: 2592000000
  subscription:
    plan-price: 9.90
    duration-days: 30
server:
  servlet:
    context-path: /api
logging:
  level:
    org.springframework.security: INFO
    com.mktplace: INFO
