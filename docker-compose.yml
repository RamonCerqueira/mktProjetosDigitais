version: '3.9'
services:
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
      DATABASE_URL: ${DATABASE_URL:-file:./dev.db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NEXT_PUBLIC_UPLOAD_MAX_BYTES: ${NEXT_PUBLIC_UPLOAD_MAX_BYTES:-10485760}
    ports:
      - "3000:3000"
    volumes:
      - ./.uploads:/app/.uploads
      - ./frontend/prisma:/app/prisma
