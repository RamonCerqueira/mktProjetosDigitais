version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME:-marketplace}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD:-marketplace}
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/marketplace}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-marketplace}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-marketplace}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-marketplace}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-marketplace}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-super-secret-key-super-secret-key-super-secret-key}
      APP_JWT_ACCESS_EXPIRATION_MS: ${APP_JWT_ACCESS_EXPIRATION_MS:-3600000}
      APP_JWT_REFRESH_EXPIRATION_MS: ${APP_JWT_REFRESH_EXPIRATION_MS:-2592000000}
      APP_SUBSCRIPTION_PLAN_PRICE: ${APP_SUBSCRIPTION_PLAN_PRICE:-9.99}
      APP_SUBSCRIPTION_DURATION_DAYS: ${APP_SUBSCRIPTION_DURATION_DAYS:-30}
      APP_EVENTS_ENABLED: ${APP_EVENTS_ENABLED:-true}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
